<!doctype html>
<html lang="fr"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Modifier le planning APS</title><link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicongsessions.png') }}">
  <style>
    body{font-family:Inter,Arial,sans-serif;background:#f6f3ec;margin:0;color:#171717}.wrap{max-width:1450px;margin:auto;padding:28px}.card{background:#fff;border:1px solid #e5dfd2;border-radius:18px;padding:22px;box-shadow:0 10px 35px #0000000d}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:16px}h1{margin:0 0 8px}.muted{color:#6b7280}.btn,.mini{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;text-decoration:none;background:#e5e7eb;color:#111}.mini{font-size:12px;padding:6px 9px}.dark{background:#111827;color:#fff}.gold{background:#d6ac48}.danger{background:#b91c1c;color:#fff}.insert{background:#dcfce7;color:#166534}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:14px 0}.metric,.curriculum{border:1px solid #e5e7eb;border-radius:12px;padding:12px}.metric strong{display:block;font-size:20px}.curriculum{margin:18px 0;background:#fafaf9}.curriculum h2{font-size:17px;margin:0 0 12px}.content-row{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid #eee;font-size:13px}.status{width:10px;height:10px;border-radius:50%;display:inline-block}.complete{background:#16a34a}.partial{background:#f59e0b}.missing{background:#dc2626}.error,.ok{display:none;padding:12px;border-radius:10px;margin:12px 0}.error{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}.day{margin-top:20px;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden}.day h2{margin:0;padding:12px 16px;background:#111827;color:#fff;font-size:16px}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #eee;padding:8px;vertical-align:top}th{background:#f9fafb;text-align:left;font-size:12px;text-transform:uppercase;color:#6b7280}input,select{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:8px;padding:8px;background:#fff}.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.readonly{font-size:12px;color:#374151;white-space:nowrap}.badge{display:inline-flex;border-radius:999px;padding:5px 9px;color:#fff;font-size:12px;font-weight:800}.badge.elearning{background:#6d28d9}.badge.presentiel{background:#0d9488}.empty{color:#9ca3af;font-style:italic}.modal{position:fixed;inset:0;background:#11182799;display:none;align-items:center;justify-content:center;padding:18px}.modal.open{display:flex}.modal-box{background:#fff;max-width:620px;width:100%;border-radius:16px;padding:20px}.course-choice{display:flex;width:100%;justify-content:space-between;text-align:left;border:1px solid #d1d5db;background:#fff;border-radius:10px;margin:8px 0;padding:11px;cursor:pointer}.course-choice:hover{border-color:#0d9488;background:#f0fdfa}@media(max-width:850px){table{font-size:12px}.content-row{grid-template-columns:1fr auto}.hide-small{display:none}}
  </style>
</head><body><main class="wrap"><div class="card">
  <div class="topbar"><div><h1>Modifier le planning APS</h1><p class="muted">Supprimez puis reprogrammez les demi-journées sans perdre le programme pédagogique.</p></div><a class="btn" href="{{ url_for('session_detail', sid=s.id) }}">Annuler</a></div>
  <div id="error" class="error"></div><div id="ok" class="ok"></div><div id="summary" class="summary"></div><section id="curriculum" class="curriculum"></section><div id="editor"></div>
  <div class="topbar" style="margin-top:22px"><a class="btn" href="{{ url_for('session_detail', sid=s.id) }}">Annuler</a><div><button class="btn dark" id="save">Enregistrer les modifications</button> <button class="btn gold" id="savePdf">Enregistrer et régénérer le PDF</button></div></div>
</div></main><div id="courseModal" class="modal"><div class="modal-box"><div class="topbar"><h2 style="margin:0">Insérer un cours</h2><button class="mini" onclick="closeModal()">Fermer</button></div><p id="modalHint" class="muted"></p><div id="courseChoices"></div></div></div>
<script>
const sid={{ s.id|tojson }}; let planning=[], curriculum=null, selectedSlot=null;
const err=document.getElementById('error'),ok=document.getElementById('ok'),editor=document.getElementById('editor'),sum=document.getElementById('summary');
function esc(v){return String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
function hours(minutes){const h=Math.floor(minutes/60),m=minutes%60;return m?`${h} h ${m}`:`${h} h`}
function show(el,msg){el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',5000)}
function renderSummary(){if(!curriculum)return;const c=curriculum;sum.innerHTML=`<div class="metric"><span>Heures APS obligatoires</span><strong>${hours(c.expectedMinutes)}</strong></div><div class="metric"><span>Heures planifiées</span><strong>${hours(c.plannedMinutes)}</strong></div><div class="metric"><span>Heures restant à planifier</span><strong>${hours(c.remainingMinutes)}</strong></div>`;document.getElementById('curriculum').innerHTML=`<h2>Contenus restant à planifier</h2>${c.contents.map(x=>`<div class="content-row"><div><span class="status ${x.status}"></span> <strong>${esc(x.uv)} — ${esc(x.title)}</strong></div><span class="hide-small">Prévues : ${hours(x.expectedMinutes)}</span><span>Planifiées : ${hours(x.plannedMinutes)}</span><strong>Restantes : ${hours(Math.max(0,x.remainingMinutes))}</strong></div>`).join('')}`}
function render(){editor.innerHTML='';planning.forEach((d,di)=>{const div=document.createElement('div');div.className='day';const rows=(d.slots||[]).map((s,si)=>{const empty=!!s.isEmpty, mod=s.modality==='elearning'?'E-learning / distanciel':'Présentiel', modClass=s.modality==='elearning'?'elearning':'presentiel', mins=Number(s.durationMinutes||0)||Math.round(Number(s.duration||0)*60);const modality=empty?`<select aria-label="Modalité du créneau" onchange="setEmptySlotModality(${di},${si},this.value)"><option value="presentiel" ${s.modality==='elearning'?'':'selected'}>Présentiel</option><option value="elearning" ${s.modality==='elearning'?'selected':''}>E-learning / distanciel</option></select>`:`<span class="badge ${modClass}">${mod}</span>`;return `<tr><td class="readonly">${esc(s.start)}</td><td class="readonly">${esc(s.end)}</td><td class="readonly">${hours(mins)}</td><td class="readonly">${empty?'—':esc(s.uv)}</td><td>${empty?'<span class="empty">Créneau disponible</span>':esc(s.title)}</td><td>${modality}</td><td>${empty?'—':`<input data-f="room" data-d="${di}" data-s="${si}" value="${esc(s.room)}">`}</td><td>${empty?'—':`<input data-f="trainer" data-d="${di}" data-s="${si}" value="${esc(s.trainer)}">`}</td><td><div class="actions">${empty?`<button class="mini insert" onclick="openInsert(${di},${si})">Insérer un cours</button>`:`<button class="mini danger" onclick="removeSlot(${di},${si})">Supprimer</button>`}</div></td></tr>`}).join('');div.innerHTML=`<h2>${esc(d.dayLabel||d.date)}</h2><table><thead><tr><th>Début</th><th>Fin</th><th>Durée</th><th>UV</th><th>Intitulé</th><th>Modalité</th><th>Salle</th><th>Formateur</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>`;editor.appendChild(div)});document.querySelectorAll('input[data-f]').forEach(i=>i.addEventListener('input',e=>{planning[e.target.dataset.d].slots[e.target.dataset.s][e.target.dataset.f]=e.target.value}));renderSummary()}
async function persist(regeneratePdf=false){const r=await fetch(`/api/sessions/${sid}/aps-planning`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({planningData:planning,regeneratePdf})});const j=await r.json();if(!r.ok||!j.ok){show(err,(j.errors||[j.error||'Erreur']).join(' '));return false}curriculum=j.curriculum||curriculum;show(ok,regeneratePdf?'Modifications enregistrées et PDF régénéré.':'Modifications enregistrées.');if(regeneratePdf&&j.pdfUrl)window.open(j.pdfUrl,'_blank','noopener');return true}
async function removeSlot(di,si){if(!confirm('Supprimer cette demi-journée du planning ? Son contenu restera disponible pour être reprogrammé ultérieurement.'))return;const s=planning[di].slots[si];planning[di].slots[si]={start:s.start,end:s.end,duration:s.duration,durationMinutes:s.durationMinutes,modality:s.modality||'presentiel',room:s.room||'',trainer:s.trainer||'',isEmpty:true};if(await persist())render()}
async function setEmptySlotModality(di,si,modality){const slot=planning[di].slots[si];slot.modality=modality;if(modality==='elearning'){slot.room='';slot.trainer=''}if(await persist())render()}
function openInsert(di,si){selectedSlot={di,si};const s=planning[di].slots[si],duration=Number(s.durationMinutes||0)||Math.round(Number(s.duration||0)*60),modality=s.modality==='elearning'?'E-learning / distanciel':'Présentiel';const available=(curriculum?.contents||[]).filter(x=>x.remainingMinutes>0&&x.remainingMinutes>=duration&&x.modality===s.modality);window.insertableCourses=available;document.getElementById('modalHint').textContent=`Créneau sélectionné : ${s.start}–${s.end} (${hours(duration)}) — ${modality}.`;document.getElementById('courseChoices').innerHTML=available.length?available.map((x,i)=>`<button class="course-choice" onclick="insertCourse(${i})"><span><strong>${esc(x.uv)} — ${esc(x.title)}</strong><br><small>${hours(x.remainingMinutes)} restantes • ${x.modality==='elearning'?'E-learning / distanciel':'Présentiel'}</small></span><strong>Insérer ${hours(duration)}</strong></button>`).join(''):`<p>Aucun cours ${modality.toLowerCase()} restant ne peut être inséré dans ce créneau. Modifiez la modalité du créneau ou choisissez une durée compatible.</p>`;document.getElementById('courseModal').classList.add('open')}
function closeModal(){document.getElementById('courseModal').classList.remove('open');selectedSlot=null}
async function insertCourse(index){const content=(window.insertableCourses||[])[index],s=planning[selectedSlot.di].slots[selectedSlot.si],duration=Number(s.durationMinutes||0)||Math.round(Number(s.duration||0)*60);if(!content||content.remainingMinutes<duration){show(err,'Insertion impossible : le volume restant est insuffisant pour la durée réelle de ce créneau.');return}planning[selectedSlot.di].slots[selectedSlot.si]={start:s.start,end:s.end,duration:duration/60,durationMinutes:duration,uv:content.uv,title:content.title,part:content.part,modality:content.modality,pedagogicalKey:content.key,room:s.room||'',trainer:s.trainer||'',isEmpty:false};closeModal();if(await persist())render()}
async function load(){const r=await fetch(`/api/sessions/${sid}/aps-planning`),j=await r.json();if(j.needsRegeneration)show(err,'Ce PDF ancien doit être régénéré pour devenir modifiable.');planning=j.apsPlanningData||[];curriculum=j.curriculum;render()}
document.getElementById('save').onclick=()=>persist(false);document.getElementById('savePdf').onclick=()=>persist(true);load();
</script></body></html>
