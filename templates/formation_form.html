<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}"><title>Planning</title></head><body><div style="padding:16px;"><div class="container" style="max-width:800px;margin:24px auto;">
<h1 style="color:#1e8449;">{% if mode == 'modifier' %}Modifier{% else %}Ajouter{% endif %} une formation</h1>
<form method="post" style="display:grid;gap:10px;background:#fff;padding:16px;border-radius:8px;">
<input name="nom" placeholder="Nom de la formation" value="{{ formation.nom or '' }}" required>
<select name="type" required>{% for t in types %}<option value="{{t}}" {% if formation.type==t %}selected{% endif %}>{{t}}</option>{% endfor %}</select>
<label>Date début <input type="date" name="date_debut" value="{{ formation.date_debut or '' }}" required></label>
<label>Date fin <input type="date" name="date_fin" value="{{ formation.date_fin or '' }}" required></label>
<input type="number" name="nombre_stagiaires" min="1" placeholder="Nombre de stagiaires" value="{{ formation.nombre_stagiaires or '' }}" required>
<select name="salle_souhaitee"><option value="">Salle auto</option>{% for s in salles %}<option value="{{s}}" {% if formation.salle==s or formation.salle_souhaitee==s %}selected{% endif %}>{{s}}</option>{% endfor %}</select>
<textarea name="commentaire" placeholder="Commentaire (optionnel)">{{ formation.commentaire or '' }}</textarea>
<button class="btn" type="submit">Enregistrer</button>
</form></div></div></body></html>
