<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Modifier le planning APS</title><style>
body{font-family:Inter,Arial,sans-serif;background:#f6f3ec;margin:0;color:#171717}.wrap{max-width:1450px;margin:auto;padding:28px}.card,.day{background:#fff;border:1px solid #e5dfd2;border-radius:16px;padding:20px}.day{margin-top:20px;padding:0;overflow:hidden}.topbar,.day-head,.actions{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}h1,h2{margin:0}.muted{color:#6b7280}.btn,.mini{border:0;border-radius:9px;padding:10px 14px;font-weight:700;cursor:pointer;background:#e5e7eb;color:#111;text-decoration:none}.mini{font-size:12px;padding:7px 10px}.dark{background:#111827;color:#fff}.gold{background:#d6ac48}.danger{background:#b91c1c;color:#fff}.insert{background:#dcfce7;color:#166534}.btn:disabled{opacity:.5;cursor:not-allowed}.summary{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:12px;margin:16px 0}.metric,.curriculum{border:1px solid #e5e7eb;border-radius:12px;padding:14px;background:#fff}.metric-remaining{border-color:#f97316}.remaining-badge{font-weight:800}.metric strong{display:block;font-size:25px;margin-top:6px}.curriculum{margin:18px 0;background:#fafaf9}.content-row{display:grid;grid-template-columns:1fr auto auto;gap:12px;padding:10px 0;border-top:1px solid #eee;font-size:13px}.status{width:10px;height:10px;border-radius:50%;display:inline-block}.complete{background:#16a34a}.partial{background:#f59e0b}.missing{background:#dc2626}.error,.ok{display:none;padding:12px;border-radius:10px;margin:12px 0}.error{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}.day-head{padding:13px 16px;background:#111827;color:#fff}.day-meta{font-size:13px;color:#d1d5db}.availability{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;white-space:nowrap}.available{background:#dbeafe;color:#1d4ed8}.low{background:#ffedd5;color:#c2410c}.full{background:#166534;color:#fff}.over{background:#dc2626;color:#fff}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #eee;padding:8px;vertical-align:top}th{background:#f9fafb;text-align:left;font-size:12px;color:#6b7280}input,select{box-sizing:border-box;border:1px solid #d1d5db;border-radius:8px;padding:8px;background:#fff}.time{width:105px}.badge{display:inline-flex;border-radius:999px;padding:5px 9px;color:#fff;font-size:12px;font-weight:800}.elearning{background:#6d28d9}.presentiel{background:#0d9488}.empty{color:#9ca3af;font-style:italic}.modal{position:fixed;inset:0;background:#11182799;display:none;align-items:center;justify-content:center;padding:18px}.modal.open{display:flex}.modal-box{background:#fff;max-width:620px;width:100%;border-radius:16px;padding:20px}.course-choice{display:flex;width:100%;justify-content:space-between;text-align:left;border:1px solid #d1d5db;background:#fff;border-radius:10px;margin:8px 0;padding:11px;cursor:pointer}@media(max-width:850px){.summary{grid-template-columns:1fr}.content-row{grid-template-columns:1fr}.hide-small{display:none}table{font-size:12px}}
</style></head><body><main class="wrap"><div class="card"><div class="topbar"><div><h1>Modifier le planning APS</h1><p class="muted">Modifiez les horaires puis enregistrez la ligne. La durée est calculée automatiquement.</p></div><a class="btn" href="{{ url_for('session_detail', sid=s.id) }}">Annuler</a></div><div id="error" class="error"></div><div id="ok" class="ok"></div><div id="summary" class="summary"></div><div id="planningAlert" class="muted"></div><section id="curriculum" class="curriculum"></section><div id="editor"></div><div class="topbar" style="margin-top:22px"><a class="btn" href="{{ url_for('session_detail', sid=s.id) }}">Annuler</a><div><button class="btn dark" id="save">Enregistrer les modifications</button> <button class="btn gold" id="savePdf">Enregistrer et régénérer le PDF</button></div></div></div></main><div id="courseModal" class="modal"><div class="modal-box"><div class="topbar"><h2>Insérer un cours</h2><button class="mini" onclick="closeModal()">Fermer</button></div><p id="modalHint" class="muted"></p><div id="courseChoices"></div></div></div>
<script>
const sid={{ s.id|tojson }};let planning=[],curriculum=null,dayAvailability=[],dailyCapacityMinutes=420,selectedSlot=null;let incompleteOnly=true;
const err=document.getElementById('error'),ok=document.getElementById('ok'),editor=document.getElementById('editor'),sum=document.getElementById('summary'),planningAlert=document.getElementById('planningAlert');
const esc=v=>String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');const minutes=t=>{const [h,m]=String(t||'').split(':').map(Number);return Number.isInteger(h)&&Number.isInteger(m)?h*60+m:NaN};const hours=m=>{m=Math.max(0,Math.round(m||0));return m%60?`${Math.floor(m/60)} h ${m%60}`:`${Math.floor(m/60)} h`};
function show(el,msg){el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',6000)}
function slotMinutes(s){return Math.max(0,minutes(s.end)-minutes(s.start))}function recalculate(s){const value=slotMinutes(s);s.durationMinutes=value;s.duration=Math.round(value/60*100)/100;return value}
function availability(day){const planned=(day.slots||[]).filter(s=>!s.isEmpty).reduce((n,s)=>n+slotMinutes(s),0);return {planned,available:dailyCapacityMinutes-planned}}
function clientErrors(){const errors=[];planning.forEach(d=>{const intervals=[];let planned=0;(d.slots||[]).forEach(s=>{const start=minutes(s.start),end=minutes(s.end);if(!Number.isFinite(start)||!Number.isFinite(end)||end<=start)errors.push(`Horaire invalide le ${d.date}: ${s.start}-${s.end}.`);if(intervals.some(([a,b])=>start<b&&end>a))errors.push(`Ces horaires chevauchent un autre cours déjà planifié sur cette journée (${d.date}).`);intervals.push([start,end]);if(!s.isEmpty)planned+=Math.max(0,end-start)});if(planned>dailyCapacityMinutes)errors.push(`La journée ${d.date} dépasse sa capacité de ${hours(dailyCapacityMinutes)}.`)});return [...new Set(errors)]}
function renderSummary(){if(!curriculum)return;const c=curriculum;sum.innerHTML=`<div class="metric"><span>Heures APS obligatoires</span><strong>${hours(c.expectedMinutes)}</strong></div><div class="metric"><span>Heures APS planifiées</span><strong>${hours(c.plannedMinutes)}</strong></div><div class="metric metric-remaining"><span>Heures restant à planifier</span><strong>${hours(c.remainingMinutes)}</strong></div>`;planningAlert.innerHTML=c.remainingMinutes?`Planning incomplet : ${hours(c.remainingMinutes)} restent à planifier. <a href="#curriculum">Voir les contenus à insérer</a>`:'Planning complet.';document.getElementById('curriculum').innerHTML=`<h2>Contenus pédagogiques</h2>${c.contents.map(x=>`<div class="content-row"><div><span class="status ${x.status}"></span> <strong>${esc(x.uv)} — ${esc(x.title)}</strong></div><span>Planifiées : ${hours(x.plannedMinutes)}</span><strong class="remaining-badge">Restantes : ${hours(x.remainingMinutes)}</strong></div>`).join('')}`}
function badge(a){if(a.available<0)return `<span class="availability over">Dépassement de ${hours(-a.available)}</span>`;if(a.available===0)return '<span class="availability full">Journée complète</span>';return `<span class="availability ${a.available<dailyCapacityMinutes/2?'low':'available'}">${hours(a.available)} disponibles</span>`}
function render(){editor.innerHTML='';planning.forEach((d,di)=>{const a=availability(d),complete=a.available<=0;const rows=(d.slots||[]).map((s,si)=>{const empty=!!s.isEmpty,mins=slotMinutes(s),mod=s.modality==='elearning'?'E-learning / distanciel':'Présentiel';return `<tr><td><input class="time" type="time" value="${esc(s.start)}" onchange="changeTime(${di},${si},'start',this.value)"></td><td><input class="time" type="time" value="${esc(s.end)}" onchange="changeTime(${di},${si},'end',this.value)"></td><td><strong>${hours(mins)}</strong></td><td>${empty?'—':esc(s.uv)}</td><td>${empty?'<span class="empty">Créneau disponible</span>':esc(s.title)}</td><td>${empty?`<select onchange="setEmptySlotModality(${di},${si},this.value)"><option value="presentiel" ${s.modality==='elearning'?'':'selected'}>Présentiel</option><option value="elearning" ${s.modality==='elearning'?'selected':''}>E-learning</option></select>`:`<span class="badge ${s.modality==='elearning'?'elearning':'presentiel'}">${mod}</span>`}</td><td>${empty?'—':`<input data-f="room" data-d="${di}" data-s="${si}" value="${esc(s.room)}">`}</td><td>${empty?'—':`<input data-f="trainer" data-d="${di}" data-s="${si}" value="${esc(s.trainer)}">`}</td><td><div class="actions">${empty?`<button class="mini insert" ${complete?'disabled title="Les heures disponibles sur cette journée sont déjà planifiées."':''} onclick="openInsert(${di},${si})">Insérer un cours</button>`:`<button class="mini dark" onclick="saveRow(${di},${si})">Enregistrer</button><button class="mini danger" onclick="removeSlot(${di},${si})">Supprimer</button>`}</div></td></tr>`}).join('');const div=document.createElement('section');div.className='day';div.innerHTML=`<div class="day-head"><div><h2>${esc(d.dayLabel||d.date)}</h2><div class="day-meta">${hours(a.planned)} planifiées sur ${hours(dailyCapacityMinutes)} · ${a.available>0?hours(a.available)+' disponibles':a.available===0?'Journée complète':'Dépassement'}</div></div>${badge(a)}</div><table><thead><tr><th>Début</th><th>Fin</th><th>Durée calculée</th><th>UV</th><th>Intitulé</th><th>Modalité</th><th>Salle</th><th>Formateur</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>`;editor.appendChild(div)});document.querySelectorAll('input[data-f]').forEach(i=>i.addEventListener('input',e=>planning[e.target.dataset.d].slots[e.target.dataset.s][e.target.dataset.f]=e.target.value));renderSummary()}
function changeTime(di,si,key,value){planning[di].slots[si][key]=value;recalculate(planning[di].slots[si]);render();const problems=clientErrors();if(problems.length)show(err,problems.join(' '))}
async function persist(regeneratePdf=false){const problems=clientErrors();if(problems.length){show(err,problems.join(' '));return false}const r=await fetch(`/api/sessions/${sid}/aps-planning`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({planningData:planning,regeneratePdf})}),j=await r.json();if(!r.ok||!j.ok){show(err,(j.errors||[j.error||'Erreur']).join(' '));return false}planning=j.planningData||planning;curriculum=j.curriculum||curriculum;dayAvailability=j.dayAvailability||[];dailyCapacityMinutes=j.dailyCapacityMinutes||dailyCapacityMinutes;show(ok,regeneratePdf?'Modifications enregistrées et PDF régénéré.':'Modifications enregistrées.');if(regeneratePdf&&j.pdfUrl)window.open(j.pdfUrl,'_blank','noopener');return true}
async function saveRow(){if(await persist())render()}async function removeSlot(di,si){if(!confirm('Supprimer ce cours ? Son contenu restera disponible pour être reprogrammé.'))return;const s=planning[di].slots[si];planning[di].slots[si]={start:s.start,end:s.end,duration:s.duration,durationMinutes:s.durationMinutes,modality:s.modality||'presentiel',room:s.room||'',trainer:s.trainer||'',isEmpty:true};if(await persist())render()}async function setEmptySlotModality(di,si,modality){planning[di].slots[si].modality=modality;render()}
function openInsert(di,si){const s=planning[di].slots[si],duration=slotMinutes(s),a=availability(planning[di]),available=Math.max(0,Math.min(duration,a.available));selectedSlot={di,si};window.insertableCourses=(curriculum?.contents||[]).filter(x=>x.remainingMinutes>0&&x.modality===s.modality);document.getElementById('modalHint').textContent=`Créneau : ${s.start}–${s.end} (${hours(duration)}). Vous pouvez planifier jusqu’à ${hours(available)}.`;document.getElementById('courseChoices').innerHTML=window.insertableCourses.length?window.insertableCourses.map((x,i)=>`<button class="course-choice" onclick="insertCourse(${i})"><span><strong>${esc(x.uv)} — ${esc(x.title)}</strong><br><small>${hours(x.remainingMinutes)} restantes</small></span><strong>Insérer jusqu’à ${hours(Math.min(available,x.remainingMinutes))}</strong></button>`).join(''):'<p>Aucun contenu compatible restant.</p>';document.getElementById('courseModal').classList.add('open')}
function closeModal(){document.getElementById('courseModal').classList.remove('open');selectedSlot=null}async function insertCourse(index){const content=window.insertableCourses[index],s=planning[selectedSlot.di].slots[selectedSlot.si],a=availability(planning[selectedSlot.di]),duration=Math.min(slotMinutes(s),Math.max(0,a.available),content.remainingMinutes);if(duration<=0){show(err,'Aucune heure disponible sur cette date.');return}const end=minutes(s.start)+duration;s.end=`${String(Math.floor(end/60)).padStart(2,'0')}:${String(end%60).padStart(2,'0')}`;planning[selectedSlot.di].slots[selectedSlot.si]={...s,duration:duration/60,durationMinutes:duration,uv:content.uv,title:content.title,part:content.part,modality:content.modality,pedagogicalKey:content.key,isEmpty:false};closeModal();if(await persist())render()}
async function load(){const r=await fetch(`/api/sessions/${sid}/aps-planning`),j=await r.json();planning=j.apsPlanningData||[];curriculum=j.curriculum;dayAvailability=j.dayAvailability||[];dailyCapacityMinutes=j.dailyCapacityMinutes||420;render()}document.getElementById('save').onclick=()=>persist(false);document.getElementById('savePdf').onclick=()=>persist(true);load();
</script></body></html>
