<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Modifier le planning APS</title>
  <style>
    body{font-family:Inter,Arial,sans-serif;background:#f6f3ec;margin:0;color:#171717}.wrap{max-width:1400px;margin:0 auto;padding:28px}.card{background:#fff;border:1px solid #e5dfd2;border-radius:18px;padding:22px;box-shadow:0 10px 35px #0000000d}h1{margin:0 0 8px}.muted{color:#6b7280}.day{margin-top:22px;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden}.day h2{margin:0;padding:12px 16px;background:#111827;color:white;font-size:16px}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #eee;padding:8px;vertical-align:top}th{background:#f9fafb;text-align:left;font-size:12px;text-transform:uppercase;color:#6b7280}input{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:8px;padding:8px}.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.mini{font-size:11px;border:1px solid #d1d5db;background:#fff;border-radius:999px;padding:5px 8px;cursor:pointer}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:16px}.btn{border:0;border-radius:10px;padding:11px 15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;background:#e5e7eb;color:#111}.gold{background:#d6ac48}.dark{background:#111827;color:#fff}.danger{background:#fee2e2;color:#991b1b}.summary{display:flex;gap:12px;flex-wrap:wrap;margin:14px 0}.pill{background:#f3f4f6;border-radius:999px;padding:6px 10px;font-size:12px}.error{display:none;background:#fee2e2;color:#991b1b;padding:12px;border-radius:10px;margin:12px 0}.ok{display:none;background:#dcfce7;color:#166534;padding:12px;border-radius:10px;margin:12px 0}.advanced summary{cursor:pointer;color:#6b7280;font-size:12px}.readonly{font-size:12px;color:#374151;white-space:nowrap}
  </style>
</head>
<body><main class="wrap"><div class="card">
  <div class="topbar"><div><h1>Modifier le planning APS</h1><p class="muted">Modifiez le formateur ou la salle sans changer dates, horaires, durées ni UV.</p></div><a class="btn" href="{{ url_for('session_detail', sid=s.id) }}">Annuler</a></div>
  <div id="error" class="error"></div><div id="ok" class="ok"></div><div id="summary" class="summary"></div><div id="editor"></div>
  <div class="topbar" style="margin-top:22px"><a class="btn" href="{{ url_for('session_detail', sid=s.id) }}">Annuler</a><div><button class="btn dark" id="save">Enregistrer les modifications</button> <button class="btn gold" id="savePdf">Enregistrer et régénérer le PDF</button></div></div>
</div></main>
<script>
const sid={{ s.id|tojson }}; let planning=[];
const err=document.getElementById('error'), ok=document.getElementById('ok'), editor=document.getElementById('editor'), sum=document.getElementById('summary');
function show(el,msg){el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',5000)}
function applyTrainer(dayIdx, slotIdx, scope){const v=planning[dayIdx].slots[slotIdx].trainer; planning.forEach((d,di)=>d.slots.forEach((s,si)=>{const after=di>dayIdx||(di===dayIdx&&si>=slotIdx); if(scope==='day'&&di===dayIdx)s.trainer=v; if(scope==='week'&&Math.floor(di/5)===Math.floor(dayIdx/5))s.trainer=v; if(scope==='following'&&after)s.trainer=v; if(scope==='all')s.trainer=v;})); render();}
function applyRoom(dayIdx, slotIdx, scope){const v=planning[dayIdx].slots[slotIdx].room; planning.forEach((d,di)=>d.slots.forEach(s=>{if(scope==='day'&&di===dayIdx)s.room=v; if(scope==='all')s.room=v;})); render();}
function render(){editor.innerHTML=''; planning.forEach((d,di)=>{const div=document.createElement('div');div.className='day';div.innerHTML=`<h2>${d.dayLabel||d.date}</h2><table><thead><tr><th>Début</th><th>Fin</th><th>Durée</th><th>UV</th><th>Intitulé</th><th>Salle</th><th>Formateur</th></tr></thead><tbody>${d.slots.map((s,si)=>`<tr><td class="readonly">${s.start}</td><td class="readonly">${s.end}</td><td class="readonly">${s.duration}h</td><td class="readonly">${s.uv}</td><td><details class="advanced"><summary>Option avancée</summary><input data-f="title" data-d="${di}" data-s="${si}" value="${(s.title||'').replaceAll('"','&quot;')}"></details><div class="muted">${s.title||''}</div></td><td><input data-f="room" data-d="${di}" data-s="${si}" value="${(s.room||'').replaceAll('"','&quot;')}"><div class="actions"><button class="mini" onclick="applyRoom(${di},${si},'day')">Salle à la journée</button><button class="mini" onclick="applyRoom(${di},${si},'all')">Salle à tout le planning</button></div></td><td><input data-f="trainer" data-d="${di}" data-s="${si}" value="${(s.trainer||'').replaceAll('"','&quot;')}"><div class="actions"><button class="mini" onclick="applyTrainer(${di},${si},'day')">Formateur à toute la journée</button><button class="mini" onclick="applyTrainer(${di},${si},'week')">Toute la semaine</button><button class="mini" onclick="applyTrainer(${di},${si},'following')">Tous les créneaux suivants</button><button class="mini" onclick="applyTrainer(${di},${si},'all')">Tout le planning</button></div></td></tr>`).join('')}</tbody></table>`;editor.appendChild(div);}); document.querySelectorAll('input[data-f]').forEach(i=>i.addEventListener('input',e=>{planning[e.target.dataset.d].slots[e.target.dataset.s][e.target.dataset.f]=e.target.value;})); updateSummary();}
function updateSummary(){let total=0, days=planning.length; const uv={}; planning.forEach(d=>d.slots.forEach(s=>{total+=Number(s.duration||0); uv[s.uv]=(uv[s.uv]||0)+Number(s.duration||0)})); sum.innerHTML=`<span class="pill">Total ${total}h / 175h</span><span class="pill">${days} jours</span>`+Object.entries(uv).map(([k,v])=>`<span class="pill">${k}: ${v}h</span>`).join('');}
async function load(){const r=await fetch(`/api/sessions/${sid}/aps-planning`); const j=await r.json(); if(j.needsRegeneration) show(err,'Ce PDF ancien doit être régénéré pour devenir modifiable.'); planning=j.apsPlanningData||[]; render();}
async function save(regeneratePdf){err.style.display='none'; const r=await fetch(`/api/sessions/${sid}/aps-planning`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({planningData:planning,regeneratePdf})}); const j=await r.json(); if(!r.ok||!j.ok){show(err,(j.errors||[j.error||'Erreur']).join(' ')); return;} show(ok, regeneratePdf?'Modifications enregistrées et PDF régénéré.':'Modifications enregistrées.'); if(regeneratePdf&&j.pdfUrl) window.open(j.pdfUrl,'_blank','noopener');}
document.getElementById('save').onclick=()=>save(false); document.getElementById('savePdf').onclick=()=>save(true); load();
</script></body></html>
