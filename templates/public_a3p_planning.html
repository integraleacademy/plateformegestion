<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Planning A3P formateur</title><style>
body{margin:0;font-family:Inter,system-ui,Arial;background:#f6f8fb;color:#172033}.wrap{max-width:1050px;margin:auto;padding:24px}.hero,.card{background:white;border:1px solid #e6eaf0;border-radius:24px;padding:22px;box-shadow:0 16px 40px rgba(15,23,42,.08);margin-bottom:16px}.hero{background:linear-gradient(135deg,#111827,#334155);color:#fff}.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.pill{display:inline-flex;border-radius:999px;padding:7px 11px;font-weight:800;background:#e0f2fe;color:#075985}.ok{background:#dcfce7;color:#166534}.warn{background:#fed7aa;color:#9a3412}.err{background:#fee2e2;color:#991b1b}.module-head{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.rows{display:grid;gap:8px;margin-top:12px}.row{display:grid;grid-template-columns:1.2fr 1fr 1fr auto;gap:8px;align-items:end}.row input{padding:10px;border:1px solid #cbd5e1;border-radius:12px}.btn{border:0;border-radius:14px;padding:11px 14px;font-weight:800;cursor:pointer;background:#111827;color:#fff}.btn.gold{background:#c9a227}.btn.light{background:#eef2f7;color:#172033}.errors{white-space:pre-line;color:#991b1b;background:#fee2e2;border-radius:16px;padding:12px;display:none}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}@media(max-width:700px){.row{grid-template-columns:1fr}.wrap{padding:12px}}</style></head><body><main class="wrap"><section class="hero"><h1>Modules imposés A3P</h1><p>Merci de compléter les dates des modules imposés ci-dessous.</p><div class="meta" id="meta"></div></section><div class="errors" id="errors"></div><div id="modules"></div><div class="actions"><button class="btn light" id="save">Enregistrer</button><button class="btn gold" id="complete">J’ai terminé</button></div></main><script>
const token={{ token|tojson }}; let state=null, modulesData={};
const minutes=v=>{const [h,m]=(v||'00:00').split(':').map(Number);return h*60+m}; const fmt=d=>d?d.split('-').reverse().join('/'):'—'; const hours=min=>(Math.round(min/6)/10).toString().replace('.',',')+'h';
function rowHtml(code,row={},i=0){return `<div class="row"><label>Date<input type="date" data-code="${code}" data-i="${i}" data-f="date" value="${row.date||''}" min="${state.startDate}" max="${state.endDate}"></label><label>Début<input type="time" data-code="${code}" data-i="${i}" data-f="start" value="${row.start||'09:00'}"></label><label>Fin<input type="time" data-code="${code}" data-i="${i}" data-f="end" value="${row.end||'12:30'}"></label><button class="btn light" data-del="${code}:${i}" type="button">Supprimer</button></div>`}
function moduleMinutes(code){return (modulesData[code]||[]).reduce((s,r)=>s+Math.max(0,minutes(r.end)-minutes(r.start)),0)}
function render(){document.getElementById('meta').innerHTML=`<div><strong>Formation</strong><br>A3P</div><div><strong>Dates</strong><br>${fmt(state.startDate)} → ${fmt(state.endDate)}</div><div><strong>Examen</strong><br>${fmt(state.examDate)}</div><div><strong>Salle / lieu</strong><br>${state.room||'—'}</div><div><strong>Formateur</strong><br>${state.trainerName||'—'}</div>`; document.getElementById('modules').innerHTML=state.modules.map(m=>{const total=moduleMinutes(m.code), target=m.hours*60, ok=total===target; return `<section class="card"><div class="module-head"><div><h2>${m.title}</h2><p>Total sélectionné : <strong>${hours(total)}</strong> / ${m.hours}h</p></div><span class="pill ${ok?'ok':'warn'}">${ok?'Complet':'Incomplet'}</span></div><div class="rows">${(modulesData[m.code]||[]).map((r,i)=>rowHtml(m.code,r,i)).join('')}</div><button class="btn light" data-add="${m.code}" type="button">Ajouter une date</button></section>`}).join(''); document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{(modulesData[b.dataset.add] ||= []).push({date:state.startDate,start:'09:00',end:'12:30'}); render(); debouncedSave();}); document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{const [c,i]=b.dataset.del.split(':'); modulesData[c].splice(+i,1); render(); debouncedSave();}); document.querySelectorAll('input[data-code]').forEach(i=>i.oninput=e=>{modulesData[e.target.dataset.code][+e.target.dataset.i][e.target.dataset.f]=e.target.value; render(); debouncedSave();});}
async function load(){const r=await fetch(`/api/public/a3p-planning/${token}`); const j=await r.json(); if(!r.ok)throw new Error(j.error||'Lien invalide'); state=j.data; modulesData=state.modulesData||{}; state.modules.forEach(m=>modulesData[m.code] ||= []); render();}
async function save(){const r=await fetch(`/api/public/a3p-planning/${token}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({modulesData})}); const j=await r.json(); if(!r.ok)throw new Error(j.error||'Erreur'); showErrors(j.errors||[]); return j;}
let timer; function debouncedSave(){clearTimeout(timer); timer=setTimeout(()=>save().catch(e=>showErrors([e.message])),600)}
function showErrors(errors){const box=document.getElementById('errors'); box.style.display=errors.length?'block':'none'; box.textContent=errors.join('\n');}
document.getElementById('save').onclick=()=>save().catch(e=>showErrors([e.message])); document.getElementById('complete').onclick=async()=>{try{await save(); const r=await fetch(`/api/public/a3p-planning/${token}/complete`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({modulesData})}); const j=await r.json(); if(!r.ok){showErrors(j.errors||[j.error||'Incomplet']); return;} showErrors([]); alert('Merci, les modules sont complétés.');}catch(e){showErrors([e.message]);}}; load().catch(e=>showErrors([e.message]));
</script></body></html>
