<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>{{ title }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='studio_visuals/css/studio-shell.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='studio_visuals/css/studio-canvas.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='studio_visuals/css/studio-templates.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='studio_visuals/css/studio-themes.css') }}">
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js" defer></script>
<script id="studio-config" type="application/json">{{ config|tojson }}</script>
<script type="module" src="{{ url_for('static', filename='studio_visuals/js/studio-app.js') }}"></script>
</head><body class="social-studio"><div id="social-studio-export-root" aria-hidden="true"></div>
<header class="social-studio__topbar"><a class="social-studio__back" href="{{ url_for('index') }}">← Tableau de bord</a><input id="projectName" aria-label="Nom du projet" class="social-studio__project" value="Session APS septembre 2026"><span id="saveState" class="social-studio__save-state">Brouillon</span><button data-action="undo">↶ Annuler</button><button data-action="redo">↷ Rétablir</button><select id="formatSelect" aria-label="Format"><option value="instagram_portrait">1080 × 1350</option><option value="instagram_square">1080 × 1080</option><option value="story">1080 × 1920</option><option value="linkedin_landscape">1200 × 627</option></select><select id="zoomSelect" aria-label="Zoom"><option value="fit">Ajuster</option><option value="25">25 %</option><option value="50">50 %</option><option value="75">75 %</option><option value="100">100 %</option><option value="125">125 %</option><option value="150">150 %</option></select><button data-action="zoomOut">−</button><button data-action="zoomIn">+</button><button data-action="save" class="social-studio__primary">Enregistrer</button><button data-action="openExport" class="social-studio__dark">Exporter</button></header>
<main class="social-studio__layout"><aside class="social-studio__sidebar"><nav>{% for tab in ['Modèles','Contenu','Charte','Éléments','Médias','Données','IA','Historique','Vérification'] %}<button class="social-studio__tab{% if loop.first %} is-active{% endif %}" data-tab="{{ tab|lower }}">{{ tab }}</button>{% endfor %}</nav><section id="leftPanel" class="social-studio__panel"></section></aside><section class="social-studio__workspace"><div class="social-studio__canvas-shell" id="canvasShell"><div id="previewMount" class="social-studio__stage social-studio-stage"></div></div><div id="filmstrip" class="social-studio__filmstrip"></div></section><aside class="social-studio__inspector"><h2>Inspecteur</h2><label>Formation<select id="inspectorFormation"></select></label><label>Template<select id="inspectorTemplate"></select></label><label>Variante<select id="inspectorVariant"><option>light</option><option>dark</option><option>dashboard</option><option>minimal</option></select></label><label><input type="checkbox" id="showSafe" checked> Marges de sécurité</label><label><input type="checkbox" id="showLogo" checked> Logo</label><div id="qualityPanel"></div></aside></main>
<dialog id="exportDialog" class="social-studio__dialog"><h2>Export</h2><label>Qualité<select id="exportQuality"><option value="standard">PNG standard · 1080 × 1350</option><option value="hd">PNG HD · 2160 × 2700</option><option value="square">Carré · 1080 × 1080</option><option value="story">Story · 1080 × 1920</option></select></label><label>Portée<select id="exportScope"><option value="current">Slide actuelle</option><option value="all">Tout le carrousel</option></select></label><label>Nom du fichier<input id="exportFilename" value="integrale-academy-aps-session-septembre-2026"></label><progress id="exportProgress" max="100" value="0"></progress><p id="exportMessage"></p><menu><button data-action="closeExport">Fermer</button><button data-action="exportStandard">Exporter PNG standard</button><button data-action="exportHd" class="social-studio__dark">Exporter PNG HD</button></menu></dialog>
</body></html>
