<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Modifier le planning APS</title><style>
body{font-family:Inter,Arial,sans-serif;background:#f6f3ec;margin:0;color:#171717}.wrap{max-width:1450px;margin:auto;padding:28px}.card,.day{background:#fff;border:1px solid #e5dfd2;border-radius:16px;padding:20px}.day{margin-top:20px;padding:0;overflow:hidden}.topbar,.day-head,.actions{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}h1,h2{margin:0}.muted{color:#6b7280}.btn,.mini{border:0;border-radius:9px;padding:10px 14px;font-weight:700;cursor:pointer;background:#e5e7eb;color:#111;text-decoration:none}.mini{font-size:12px;padding:7px 10px}.dark{background:#111827;color:#fff}.gold{background:#d6ac48}.danger{background:#b91c1c;color:#fff}.insert{background:#dcfce7;color:#166534}.btn:disabled{opacity:.5;cursor:not-allowed}.summary{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:12px;margin:16px 0}.metric,.curriculum{border:1px solid #e5e7eb;border-radius:12px;padding:14px;background:#fff}.metric-remaining{border-color:#f97316}.remaining-badge{font-weight:800}.metric strong{display:block;font-size:25px;margin-top:6px}.curriculum{margin:18px 0;background:#fafaf9}.content-row{display:grid;grid-template-columns:1fr auto auto;gap:12px;padding:10px 0;border-top:1px solid #eee;font-size:13px}.status{width:10px;height:10px;border-radius:50%;display:inline-block}.complete{background:#16a34a}.partial{background:#f59e0b}.missing{background:#dc2626}.error,.ok{display:none;padding:12px;border-radius:10px;margin:12px 0}.error{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}.day-head{padding:13px 16px;background:#111827;color:#fff}.day-meta{font-size:13px;color:#d1d5db}.availability{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;white-space:nowrap}.available{background:#dbeafe;color:#1d4ed8}.low{background:#ffedd5;color:#c2410c}.full{background:#166534;color:#fff}.over{background:#dc2626;color:#fff}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #eee;padding:8px;vertical-align:top}th{background:#f9fafb;text-align:left;font-size:12px;color:#6b7280}input,select{box-sizing:border-box;border:1px solid #d1d5db;border-radius:8px;padding:8px;background:#fff}.time{width:105px}.badge{display:inline-flex;border-radius:999px;padding:5px 9px;color:#fff;font-size:12px;font-weight:800}.elearning{background:#6d28d9}.presentiel{background:#0d9488}.empty{color:#9ca3af;font-style:italic}.modal{position:fixed;inset:0;background:#11182799;display:none;align-items:center;justify-content:center;padding:18px}.modal.open{display:flex}.modal-box{background:#fff;max-width:620px;width:100%;border-radius:16px;padding:20px}.course-choice{display:flex;width:100%;justify-content:space-between;text-align:left;border:1px solid #d1d5db;background:#fff;border-radius:10px;margin:8px 0;padding:11px;cursor:pointer}@media(max-width:850px){.summary{grid-template-columns:1fr}.content-row{grid-template-columns:1fr}.hide-small{display:none}table{font-size:12px}}
</style></head><body><main class="wrap"><div class="card"><div class="topbar"><div><h1>Modifier le planning APS</h1><p class="muted">Modifiez les horaires puis enregistrez la ligne. La durée est calculée automatiquement.</p></div><a class="btn" href="{{ url_for('session_detail', sid=s.id) }}">Annuler</a></div><div id="error" class="error"></div><div id="ok" class="ok"></div><div id="summary" class="summary"></div><div id="planningAlert" class="error" role="alert"></div><section id="curriculum" class="curriculum"></section><div id="editor"></div><div class="topbar" style="margin-top:22px"><a class="btn" href="{{ url_for('session_detail', sid=s.id) }}">Annuler</a><div><button type="button" class="btn dark" id="save">Enregistrer les modifications</button> <button type="button" class="btn gold" id="savePdf">Enregistrer et régénérer le PDF</button></div></div></div></main><div id="courseModal" class="modal"><div class="modal-box"><div class="topbar"><h2>Insérer un cours</h2><button type="button" class="mini" data-action="close-course-modal">Fermer</button></div><p id="modalHint" class="muted"></p><div id="modalError" class="error"></div><div id="courseChoices"></div></div></div>
<script>
const sid={{ s.id|tojson }};let planning=[],curriculum=null,dayAvailability=[],dailyCapacityMinutes=420,capacityViolations=[],selectedSlot=null;let incompleteOnly=true;
const err=document.getElementById('error'),modalErr=document.getElementById('modalError'),ok=document.getElementById('ok'),editor=document.getElementById('editor'),sum=document.getElementById('summary'),planningAlert=document.getElementById('planningAlert');
const esc=v=>String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');const minutes=t=>{const [h,m]=String(t||'').split(':').map(Number);return Number.isInteger(h)&&Number.isInteger(m)?h*60+m:NaN};const hours=m=>{m=Math.max(0,Math.round(m||0));return m%60?`${Math.floor(m/60)} h ${m%60}`:`${Math.floor(m/60)} h`};
function show(el,msg){el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',6000)}
function showActionError(message){const modal=document.getElementById('courseModal');show(modal.classList.contains('open')?modalErr:err,message)}
function slotMinutes(s){const value=minutes(s.end)-minutes(s.start);return Number.isFinite(value)&&value>0?value:0}function recalculate(s){const value=slotMinutes(s);s.durationMinutes=value;s.duration=Math.round(value/60*100)/100;return value}
function availability(day){const planned=(day.slots||[]).filter(s=>!s.isEmpty).reduce((n,s)=>n+slotMinutes(s),0);return {planned,available:dailyCapacityMinutes-planned}}
function capacityProblems(){return planning.map(day=>{const slots=(day.slots||[]).filter(s=>!s.isEmpty).map(s=>({start:s.start,end:s.end,durationMinutes:slotMinutes(s)})).filter(s=>s.durationMinutes>0),plannedMinutes=slots.reduce((n,s)=>n+s.durationMinutes,0);return plannedMinutes>dailyCapacityMinutes?{date:day.date,capacityMinutes:dailyCapacityMinutes,plannedMinutes,excessMinutes:plannedMinutes-dailyCapacityMinutes,slots}:null}).filter(Boolean)}
function scrollToDay(date){document.getElementById(`day-${date}`)?.scrollIntoView({behavior:'smooth',block:'start'})}
function capacityMessage(v){return `La journée du ${new Intl.DateTimeFormat('fr-FR',{day:'numeric',month:'long',year:'numeric',timeZone:'UTC'}).format(new Date(`${v.date}T00:00:00Z`))} contient ${hours(v.plannedMinutes)} de formation, soit un dépassement de ${hours(v.excessMinutes)}. Créneaux concernés : ${v.slots.map(s=>`- ${s.start}–${s.end} : ${hours(s.durationMinutes)}`).join(' ')}`}
function insertableMinutes(day,slot){const duration=slotMinutes(slot),a=availability(day),available=Number(a.available);if(!Number.isFinite(available)||(a.planned===0&&available<=0))return duration;return Math.max(0,Math.min(duration,available))}
function clientErrors(){const errors=[];planning.forEach(day=>{const intervals=[];let plannedMinutes=0;const scheduledSlots=(day.slots||[]).filter(slot=>!slot.isEmpty);scheduledSlots.forEach(slot=>{const start=minutes(slot.start);const end=minutes(slot.end);if(!Number.isFinite(start)||!Number.isFinite(end)||end<=start){errors.push(`Horaire invalide le ${day.date}: ${slot.start}-${slot.end}.`);return}const overlaps=intervals.some(([existingStart,existingEnd])=>start<existingEnd&&end>existingStart);if(overlaps)errors.push(`Ces horaires chevauchent un autre cours déjà planifié sur cette journée (${day.date}).`);intervals.push([start,end]);plannedMinutes+=end-start});if(plannedMinutes>dailyCapacityMinutes)errors.push(`La journée ${day.date} dépasse sa capacité de ${hours(dailyCapacityMinutes)}.`)});return [...new Set(errors)]}
function renderSummary(){if(!curriculum)return;const c=curriculum,problems=capacityProblems();planningAlert.innerHTML=problems.length?`Le planning contient ${problems.length} journée${problems.length>1?'s':''} dépassant la limite de ${hours(dailyCapacityMinutes)}. Corrigez-la avant d’enregistrer de nouvelles modifications. <button type="button" class="mini danger" onclick="scrollToDay('${problems[0].date}')">Voir la journée concernée</button>`:(c.remainingMinutes?`Planning incomplet : ${hours(c.remainingMinutes)} restent à planifier. <a href="#curriculum">Voir les contenus à insérer</a>`:'Planning complet.');planningAlert.className=problems.length?'error':'muted';planningAlert.style.display='block';sum.innerHTML=`<div class="metric"><span>Heures APS obligatoires</span><strong>${hours(c.expectedMinutes)}</strong></div><div class="metric"><span>Heures APS planifiées</span><strong>${hours(c.plannedMinutes)}</strong></div><div class="metric metric-remaining"><span>Heures restant à planifier</span><strong>${hours(c.remainingMinutes)}</strong></div>`;document.getElementById('curriculum').innerHTML=`<h2>Contenus pédagogiques</h2>${c.contents.map(x=>`<div class="content-row"><div><span class="status ${x.status}"></span> <strong>${esc(x.uv)} — ${esc(x.title)}</strong></div><span>Planifiées : ${hours(x.plannedMinutes)}</span><strong class="remaining-badge">Restantes : ${hours(x.remainingMinutes)}</strong></div>`).join('')}`}
function badge(a){if(a.available<0)return `<span class="availability over">Dépassement de ${hours(-a.available)}</span>`;if(a.available===0)return '<span class="availability full">Journée complète</span>';return `<span class="availability ${a.available<dailyCapacityMinutes/2?'low':'available'}">${hours(a.available)} disponibles</span>`}
function render(){editor.innerHTML='';planning.forEach((d,di)=>{const a=availability(d),complete=a.available<=0;const rows=(d.slots||[]).map((s,si)=>{const empty=!!s.isEmpty,mins=slotMinutes(s),mod=s.modality==='elearning'?'E-learning / distanciel':'Présentiel';return `<tr><td><input class="time" type="time" value="${esc(s.start)}" onchange="changeTime(${di},${si},'start',this.value)"></td><td><input class="time" type="time" value="${esc(s.end)}" onchange="changeTime(${di},${si},'end',this.value)"></td><td><strong>${hours(mins)}</strong></td><td>${empty?'—':esc(s.uv)}</td><td>${empty?'<span class="empty">Créneau disponible</span>':esc(s.title)}</td><td>${empty?`<select onchange="setEmptySlotModality(${di},${si},this.value)"><option value="presentiel" ${s.modality==='elearning'?'':'selected'}>Présentiel</option><option value="elearning" ${s.modality==='elearning'?'selected':''}>E-learning</option></select>`:`<span class="badge ${s.modality==='elearning'?'elearning':'presentiel'}">${mod}</span>`}</td><td>${empty?'—':`<input data-f="room" data-d="${di}" data-s="${si}" value="${esc(s.room)}">`}</td><td>${empty?'—':`<input data-f="trainer" data-d="${di}" data-s="${si}" value="${esc(s.trainer)}">`}</td><td><div class="actions">${empty?`<button type="button" class="mini insert" data-action="open-course-modal" data-day-index="${di}" data-slot-index="${si}" ${complete?'disabled title="Les heures disponibles sur cette journée sont déjà planifiées."':''}>Insérer un cours</button>`:`<button type="button" class="mini dark" onclick="saveRow(${di},${si})">Enregistrer</button><button type="button" class="mini danger" onclick="removeSlot(${di},${si})">Supprimer</button>`}</div></td></tr>`}).join('');const div=document.createElement('section');div.className='day';div.id=`day-${d.date}`;div.innerHTML=`<div class="day-head"><div><h2>${esc(d.dayLabel||d.date)}</h2><div class="day-meta">${hours(a.planned)} planifiées sur ${hours(dailyCapacityMinutes)} · ${a.available>0?hours(a.available)+' disponibles':a.available===0?'Journée complète':'Dépassement'}</div></div>${badge(a)}</div><table><thead><tr><th>Début</th><th>Fin</th><th>Durée calculée</th><th>UV</th><th>Intitulé</th><th>Modalité</th><th>Salle</th><th>Formateur</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>`;editor.appendChild(div)});document.querySelectorAll('input[data-f]').forEach(i=>i.addEventListener('input',e=>planning[e.target.dataset.d].slots[e.target.dataset.s][e.target.dataset.f]=e.target.value));renderSummary()}
function changeTime(di,si,key,value){planning[di].slots[si][key]=value;recalculate(planning[di].slots[si]);render();const problems=clientErrors();if(problems.length)show(err,problems.join(' '))}
async function persist(regeneratePdf=false){const problems=clientErrors();if(problems.length){showActionError(problems.join(' '));return false}try{const r=await fetch(`/api/sessions/${sid}/aps-planning`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({planningData:planning,regeneratePdf})});const responseText=await r.text();let j;try{j=responseText?JSON.parse(responseText):{}}catch(parseError){console.error('Réponse serveur non JSON',{status:r.status,responseText});showActionError(`Le serveur a renvoyé une réponse invalide — erreur HTTP ${r.status}.`);return false}if(!r.ok||!j.ok){const messages=Array.isArray(j.capacityViolations)&&j.capacityViolations.length?j.capacityViolations.map(capacityMessage):(Array.isArray(j.errors)?j.errors:[j.error||`Erreur HTTP ${r.status}`]);console.error('Impossible d’enregistrer le planning APS',{status:r.status,response:j,planning});showActionError(`Impossible d’insérer ce cours : ${messages.join(' ')}`);return false}planning=j.planningData||j.apsPlanningData||planning;curriculum=j.curriculum||curriculum;dayAvailability=j.dayAvailability||[];dailyCapacityMinutes=j.dailyCapacityMinutes||dailyCapacityMinutes;capacityViolations=j.capacityViolations||[];show(ok,regeneratePdf?'Modifications enregistrées et PDF régénéré.':'Modifications enregistrées.');if(regeneratePdf&&j.pdfUrl)window.open(j.pdfUrl,'_blank','noopener');return true}catch(error){console.error('Impossible d’enregistrer l’insertion APS.',{error,sessionId:sid,planning});showActionError(`Impossible d’insérer ce cours : ${error.message||'erreur réseau'}.`);return false}}
async function saveRow(){if(await persist())render()}async function removeSlot(di,si){if(!confirm('Supprimer ce cours ? Son contenu restera disponible pour être reprogrammé.'))return;const s=planning[di].slots[si];planning[di].slots[si]={start:s.start,end:s.end,duration:s.duration,durationMinutes:s.durationMinutes,modality:s.modality||'presentiel',room:s.room||'',trainer:s.trainer||'',isEmpty:true};if(await persist())render()}async function setEmptySlotModality(di,si,modality){planning[di].slots[si].modality=modality;render()}
function openInsert(di,si){const s=planning[di].slots[si],duration=slotMinutes(s),available=insertableMinutes(planning[di],s);selectedSlot={di,si};window.insertableCourses=(curriculum?.contents||[]).filter(x=>x.remainingMinutes>0&&x.modality===s.modality);document.getElementById('modalHint').textContent=`Créneau : ${s.start}–${s.end} (${hours(duration)}). Vous pouvez planifier jusqu’à ${hours(available)}.`;document.getElementById('courseChoices').innerHTML=window.insertableCourses.length?window.insertableCourses.map((x,i)=>`<button type="button" class="course-choice" data-action="insert-course" data-course-index="${i}" data-course-key="${esc(x.key)}" data-course-id="${esc(x.uv)}" data-session-id="${esc(sid)}" data-planning-date="${esc(planning[di].date)}" data-start-time="${esc(s.start)}" data-end-time="${esc(s.end)}" data-max-duration="${Math.min(available,x.remainingMinutes)}" ${available<=0?'disabled title="Aucune heure disponible sur cette journée."':''}><span><strong>${esc(x.uv)} — ${esc(x.title)}</strong><br><small>${hours(x.remainingMinutes)} restantes</small></span><strong>Insérer jusqu’à ${hours(Math.min(available,x.remainingMinutes))}</strong></button>`).join(''):'<p>Aucun contenu compatible restant.</p>';document.getElementById('courseModal').classList.add('open')}
function closeModal(){document.getElementById('courseModal').classList.remove('open');selectedSlot=null}
async function insertCourse(button){const index=Number(button.dataset.courseIndex);const content=window.insertableCourses?.[index];const selected=selectedSlot||{};const di=selected.di;const si=selected.si;const day=planning?.[di];const slot=day?.slots?.[si];if(!content||!day||!slot){showActionError('Le créneau ou le cours sélectionné est introuvable.');return}const availableMinutes=insertableMinutes(day,slot);const duration=Math.min(availableMinutes,Number(content.remainingMinutes||0));if(!Number.isFinite(duration)||duration<=0){showActionError('Aucune heure ne peut être insérée dans ce créneau.');return}const startMinutes=minutes(slot.start);const originalEndMinutes=minutes(slot.end);if(!Number.isFinite(startMinutes)||!Number.isFinite(originalEndMinutes)||originalEndMinutes<=startMinutes){showActionError('Les horaires de ce créneau sont invalides.');return}const insertedEndMinutes=startMinutes+duration;const insertedEnd=`${String(Math.floor(insertedEndMinutes/60)).padStart(2,'0')}:${String(insertedEndMinutes%60).padStart(2,'0')}`;const insertedSlot={...slot,start:slot.start,end:insertedEnd,duration:duration/60,durationMinutes:duration,uv:content.uv,title:content.title,part:content.part,modality:content.modality,pedagogicalKey:content.key,isEmpty:false};const remainingMinutes=originalEndMinutes-insertedEndMinutes;const remainingSlot=remainingMinutes>0?{start:insertedEnd,end:slot.end,duration:remainingMinutes/60,durationMinutes:remainingMinutes,modality:slot.modality||'presentiel',room:slot.room||'',trainer:slot.trainer||'',isEmpty:true}:null;const originalSlots=day.slots.map(existingSlot=>({...existingSlot}));day.slots.splice(si,1,insertedSlot,...(remainingSlot?[remainingSlot]:[]));const originalMarkup=button.innerHTML;button.disabled=true;button.textContent='Insertion…';const saved=await persist();if(saved){closeModal();render();return}day.slots=originalSlots;button.disabled=false;button.innerHTML=originalMarkup}
document.addEventListener('click',async event=>{const button=event.target.closest('[data-action]');if(!button)return;if(button.dataset.action==='open-course-modal'){openInsert(Number(button.dataset.dayIndex),Number(button.dataset.slotIndex));return}if(button.dataset.action==='close-course-modal'){closeModal();return}if(button.dataset.action==='insert-course'){event.preventDefault();await insertCourse(button)}});
async function load(){const r=await fetch(`/api/sessions/${sid}/aps-planning`),j=await r.json();planning=j.apsPlanningData||[];curriculum=j.curriculum;dayAvailability=j.dayAvailability||[];dailyCapacityMinutes=j.dailyCapacityMinutes||420;capacityViolations=j.capacityViolations||[];render()}document.getElementById('save').onclick=()=>persist(false);document.getElementById('savePdf').onclick=()=>persist(true);load();
</script></body></html>
